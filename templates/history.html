<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Verificações</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #999;
            padding: 10px;
        }

        th {
            background: #eee;
        }

        a {
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>

    <h2>Histórico de Verificações</h2>
    <a href="/">Voltar</a>

    {% if rows %}
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Claim</th>
                <th>Resultado</th>
                <th>Data</th>
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                <td>{{ row["id"] }}</td>
                <td>{{ row["claim_text"] }}</td>
                <td>{{ row["result"] }}</td>
                <td>{{ row["created_at"] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p>Nenhum registro encontrado.</p>
    {% endif %}

</body>
</html>
